<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body class="profile-page">

    
<div class="navbar">
    <h2>Profile</h2>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="feed-container">

    <div class="profile-card">

        <div class="profile-avatar-container">

        <div class ="profile-avatar" id="avatar"
        onclick="document.getElementById('profileImage').click()">
        </div>

        
          <div class="camera-icon"
     onclick="toggleCameraMenu()">
    ✏️
</div>

<div class="camera-menu" id="cameraMenu">

    <div onclick="document.getElementById('profileImage').click()">
        Change Photo
    </div>

    <div onclick="removeProfilePic()">
        Remove Photo
    </div>

</div>

</div>

        <input
         type="file"
         id="profileImage"
         accept="image/*"
          onchange="uploadProfilePic()"
          style="display:none;">

        <h2 id="name"></h2>

        <div class="stats">

            <div>
            Followers
            <h3 id="followersCount" onclick="showFollowers()">0</h3>
       </div>

             <div>
             Following
            <h3 id="followingCount" onclick="showFollowing()">0</h3>
        </div>

        </div>

    </div>

    <div class="profile-tabs">

    <button onclick="loadMyPosts()">
        📄 Posts
    </button>

    <button onclick="loadSavedPosts()">
        🔖 Saved
    </button>

</div>
     <div id="userPosts"></div>

</div>

<div id="userModal" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h2 id="modalTitle"></h2>

        <div id="modalUsers"></div>

    </div>
</div>

<script src="js/profile.js"></script>

</body>
</html>
